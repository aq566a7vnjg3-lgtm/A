<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>必要書類確認ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Barlow+Condensed:wght@700;800;900&family=Rajdhani:wght@600;700&display=swap');

  :root {
    --green: #3dff6e;
    --green-dark: #28cc52;
    --green-glow: rgba(61,255,110,0.35);
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --white: #ffffff;
    --gray1: #f0f0f0;
    --gray2: #aaaaaa;
    --gray3: #666;
    --gray4: #333;
    --gray5: #1e1e1e;
    --border: #2a2a2a;
    --border-bright: #3a3a3a;
    --blue: #2a6099;
    --blue-bright: #4a90d9;
    --amber: #f0a020;
    --red: #ff3030;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--gray1);
    min-height: 100vh;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(61,255,110,0.03) 39px, rgba(61,255,110,0.03) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(61,255,110,0.03) 39px, rgba(61,255,110,0.03) 40px);
  }

  /* HEADER */
  header {
    background: #0d0d0d;
    border-bottom: 2px solid var(--green);
    padding: 0 24px;
    display: flex;
    align-items: center;
    height: 58px;
    box-shadow: 0 0 20px var(--green-glow);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 900;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
    text-shadow: 0 0 12px var(--green-glow);
  }
  .header-logo span {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px;
    font-weight: 400;
    color: var(--gray2);
    margin-left: 12px;
    letter-spacing: 0;
  }
  .header-badge {
    margin-left: auto;
    background: rgba(61,255,110,0.1);
    border: 1px solid rgba(61,255,110,0.4);
    color: var(--green);
    font-size: 10px;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 2px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* MAIN */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--green);
    border-radius: 4px;
    padding: 12px 18px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .progress-label {
    font-size: 11px;
    color: var(--gray3);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .progress-track {
    flex: 1;
    height: 4px;
    background: var(--gray4);
    border-radius: 0;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--green-dark), var(--green));
    border-radius: 0;
    transition: width 0.4s ease;
    box-shadow: 0 0 8px var(--green-glow);
  }
  .progress-count {
    font-size: 12px;
    font-weight: 700;
    color: var(--green);
    white-space: nowrap;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-radius: 4px;
    padding: 24px 22px;
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: slideIn 0.25s ease;
    position: relative;
    overflow: hidden;
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--green), transparent);
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .q-step {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 16px;
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 18px;
    color: var(--gray1);
  }
  .q-note {
    font-size: 12px;
    color: var(--gray3);
    margin-top: -10px;
    margin-bottom: 16px;
  }

  /* CHOICE BUTTONS */
  .choices { display: grid; gap: 8px; }
  .choices.two-col { grid-template-columns: 1fr 1fr; }

  .choice-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    background: var(--bg3);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--gray2);
    transition: all 0.15s;
    text-align: left;
  }
  .choice-btn:hover {
    border-color: var(--green);
    color: var(--green);
    background: rgba(61,255,110,0.05);
    box-shadow: 0 0 10px rgba(61,255,110,0.1);
  }
  .choice-btn.selected {
    border-color: var(--green);
    background: rgba(61,255,110,0.08);
    color: var(--green);
    font-weight: 700;
    box-shadow: 0 0 14px rgba(61,255,110,0.15);
  }
  .choice-btn .icon {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1px solid var(--gray4);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 11px;
    transition: all 0.15s;
  }
  .choice-btn.selected .icon {
    background: var(--green);
    border-color: var(--green);
    color: #000;
    font-weight: 900;
  }
  .choice-btn.yes-btn.selected {
    border-color: var(--green);
    background: rgba(61,255,110,0.08);
    color: var(--green);
  }
  .choice-btn.yes-btn.selected .icon { background: var(--green); border-color: var(--green); color: #000; }
  .choice-btn.no-btn.selected {
    border-color: var(--gray3);
    background: rgba(255,255,255,0.03);
    color: var(--gray3);
  }
  .choice-btn.no-btn.selected .icon { background: var(--gray3); border-color: var(--gray3); color: #000; }

  /* NEXT BUTTON */
  .next-btn {
    width: 100%; margin-top: 16px; padding: 13px;
    background: transparent;
    border: 1px solid var(--green);
    color: var(--green);
    border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    display: none;
  }
  .next-btn:hover { background: var(--green); color: #000; box-shadow: 0 0 16px var(--green-glow); }
  .next-btn.visible { display: block; }

  /* RESET BUTTON */
  .reset-btn {
    display: block; margin: 0 auto 20px;
    padding: 8px 20px;
    background: transparent;
    border: 1px solid var(--border-bright);
    border-radius: 3px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px; color: var(--gray3);
    cursor: pointer; transition: all 0.2s;
  }
  .reset-btn:hover { border-color: var(--green); color: var(--green); }

  /* RESULT */
  #result-section { display: none; animation: slideIn 0.4s ease; }

  .result-header {
    background: linear-gradient(135deg, #0d1a0f, #111);
    border: 1px solid var(--green);
    border-bottom: none;
    border-radius: 4px 4px 0 0;
    padding: 22px 24px;
    box-shadow: 0 0 30px rgba(61,255,110,0.15);
  }
  .result-header h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 900;
    color: var(--green);
    letter-spacing: 3px; text-transform: uppercase;
    text-shadow: 0 0 16px var(--green-glow);
    margin-bottom: 4px;
  }
  .result-header p { font-size: 12px; color: var(--gray2); letter-spacing: 1px; }

  .result-body {
    background: var(--bg2);
    border: 1px solid var(--border-bright);
    border-top: none;
    border-radius: 0 0 4px 4px;
    padding: 22px 24px;
  }

  .section-block { margin-bottom: 24px; }
  .section-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 800;
    letter-spacing: 2px; text-transform: uppercase;
    color: #000;
    padding: 4px 14px;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .section-title.sec-reg   { background: var(--green); }
  .section-title.sec-trade { background: var(--blue-bright); color: #fff; }
  .section-title.sec-pay   { background: var(--amber); }
  .section-title.sec-ins   { background: #cc44cc; color: #fff; }

  .doc-list { list-style: none; display: grid; gap: 6px; }
  .doc-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px;
    background: var(--bg3);
    border-radius: 3px;
    border-left: 3px solid var(--green);
    font-size: 14px;
  }
  .doc-item.trade { border-left-color: var(--blue-bright); }
  .doc-item.pay   { border-left-color: var(--amber); }
  .doc-item.ins   { border-left-color: #cc44cc; }
  .doc-icon { font-size: 13px; margin-top: 2px; flex-shrink: 0; opacity: 0.6; }
  .doc-name { font-weight: 700; color: var(--gray1); }
  .doc-note { font-size: 11px; color: var(--gray3); margin-top: 2px; }

  .required-badge {
    margin-left: auto;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px; font-weight: 800;
    padding: 2px 8px;
    border-radius: 2px;
    white-space: nowrap; flex-shrink: 0;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .badge-required { background: rgba(61,255,110,0.15); color: var(--green); border: 1px solid rgba(61,255,110,0.3); }
  .badge-case     { background: rgba(240,160,32,0.15); color: var(--amber); border: 1px solid rgba(240,160,32,0.3); }
  .badge-car      { background: rgba(74,144,217,0.15); color: var(--blue-bright); border: 1px solid rgba(74,144,217,0.3); }

  .result-note {
    margin-top: 16px; padding: 12px 14px;
    background: rgba(240,160,32,0.07);
    border: 1px solid rgba(240,160,32,0.25);
    border-radius: 3px;
    font-size: 12px; color: var(--amber);
    line-height: 1.7;
  }

  .result-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-restart {
    flex: 1; padding: 13px;
    background: var(--green); color: #000;
    border: none; border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-restart:hover { box-shadow: 0 0 20px var(--green-glow); }
  .btn-print {
    flex: 1; padding: 13px;
    background: transparent; color: var(--gray2);
    border: 1px solid var(--border-bright); border-radius: 3px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-print:hover { border-color: var(--gray2); color: var(--gray1); }

  /* SUMMARY CHIPS */
  .summary-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .chip {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 11px; padding: 4px 12px;
    border-radius: 2px;
    background: var(--bg3); color: var(--gray3);
    border: 1px solid var(--border);
  }
  .chip.active { background: rgba(61,255,110,0.08); color: var(--green); border-color: rgba(61,255,110,0.3); }
  .chip.trade  { background: rgba(74,144,217,0.1); color: var(--blue-bright); border-color: rgba(74,144,217,0.3); }

  /* ===== MOBILE ===== */
  @media (max-width: 480px) {
    header { padding: 0 14px; height: 52px; }
    .header-logo { font-size: 20px; }
    .header-logo span { display: none; }
    .header-badge { font-size: 9px; padding: 3px 8px; letter-spacing: 1px; }

    main { padding: 14px 10px 50px; }

    .progress-bar-wrap { padding: 10px 12px; }

    .question-card { padding: 18px 14px; margin-bottom: 10px; }
    .q-text { font-size: 15px; margin-bottom: 14px; }

    /* はい/いいえの2列はそのまま、3列以上の選択肢は1列に */
    .choices.two-col { grid-template-columns: 1fr 1fr; }
    .choice-btn { padding: 11px 12px; font-size: 13px; gap: 8px; }

    .result-header { padding: 16px 14px; }
    .result-header h2 { font-size: 20px; letter-spacing: 2px; }
    .result-body { padding: 16px 14px; }

    .doc-item { padding: 9px 10px; font-size: 13px; gap: 8px; }
    .doc-name { font-size: 13px; }
    .required-badge { font-size: 9px; padding: 2px 6px; }

    .result-actions { flex-direction: column; gap: 8px; }
    .btn-restart, .btn-print { font-size: 14px; padding: 13px; }

    .summary-chips { gap: 5px; }
    .chip { font-size: 10px; padding: 3px 9px; }
  }

  /* ===== IMAGE MODAL ===== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--bg2);
    border: 1px solid var(--green);
    border-radius: 6px;
    max-width: 680px;
    width: 100%;
    box-shadow: 0 0 40px rgba(61,255,110,0.2);
    overflow: hidden;
    animation: slideIn 0.2s ease;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: #0d1a0f;
  }
  .modal-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 15px;
    font-weight: 800;
    color: var(--green);
    letter-spacing: 1px;
    text-transform: uppercase;
  }
  .modal-close {
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--gray2);
    font-size: 18px;
    line-height: 1;
    padding: 2px 10px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .modal-close:hover { border-color: var(--green); color: var(--green); }
  .modal-body {
    padding: 18px;
    text-align: center;
  }
  .modal-body img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 3px;
    border: 1px solid var(--border);
  }
  .doc-name.has-image {
    cursor: pointer;
    color: var(--green);
    text-decoration: underline dotted;
  }
  .doc-name.has-image::after {
    content: ' 🔍';
    font-size: 11px;
    opacity: 0.7;
  }
  @media (max-width: 480px) {
    .modal-box { max-width: 100%; }
    .modal-body { padding: 12px; }
  }

  @media print {
    header, .progress-bar-wrap, .reset-btn, .result-actions, #questions-section { display: none !important; }
    body { background: white; }
    main { max-width: 100%; padding: 0; }
    #result-section { display: block !important; }
    .result-header { background: #1a1a1a !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  }
</style>
</head>
<body>

<header>
  <div class="header-logo">必要書類確認ツール</div>
  <div class="header-badge">社内専用</div>
</header>

<main>

  <!-- PROGRESS -->
  <div class="progress-bar-wrap">
    <div class="progress-label">質問の進捗</div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-count" id="progress-count">0 / 0</div>
  </div>

  <!-- QUESTIONS -->
  <div id="questions-section"></div>

  <!-- RESULT -->
  <div id="result-section">
    <div class="result-header">
      <h2>📋 必要書類リスト</h2>
      <p id="result-subtitle">お客様情報に基づいた必要書類です</p>
    </div>
    <div class="result-body">
      <div class="summary-chips" id="summary-chips"></div>
      <div id="result-content"></div>
      <div class="result-note" id="result-note"></div>
      <div class="result-actions">
        <button class="btn-restart" onclick="restart()">🔄 最初からやり直す</button>
        <button class="btn-print" onclick="window.print()">🖨 印刷する</button>
      </div>
    </div>
  </div>

</main>

<!-- IMAGE MODAL -->
<div class="modal-overlay" id="img-modal" onclick="closeModal(event)">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">記入例</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <img id="modal-img" src="" alt="記入例">
    </div>
  </div>
</div>

<script>
// ==============================
// 書類ごとの記入例画像マッピング
// ==============================
const DOC_IMAGES = {
  '委任状':                        'images/ininjou.png',
  '申請依頼書':                    'images/tourokusinseiiraisyo.png',
  '車庫証明 申請書（自認書）':     'images/jininsyou.png',
  '自動車税還付委任状':            'images/jidousyazeikanpuininjou.png',
  '譲渡証明書':                    'images/hutuusyajoustosyo.png',
  '軽自動車 譲渡証明書':           'images/keijoutosyo.png',
  '車庫証明 申請書（使用承諾書）': 'images/siyousyokudakusyo.png',
  'OSS 所在図':                    'images/OSSsyozaizu.png',
  'OSS 配置図':                    'images/OSShaitizu.png',
  '軽自動車 所在図・配置図':       'images/keisyozaizuhaitizu.jpg',
  '軽自動車 下取り申請依頼書':     'images/keisitadori.png',
  '自賠責委任状（6枚綴り）':       'images/jibaiseki.png',
  '同意書':                        'images/douisyo.png',
  'インボイス':                    'images/inboisu.png',
  'ETCセットアップ委任状':          'images/ETC.jpg',
};

function openModal(docName) {
  const url = DOC_IMAGES[docName];
  if (!url) return;
  document.getElementById('modal-title').textContent = docName + '　記入例';
  document.getElementById('modal-img').src = url;
  document.getElementById('img-modal').classList.add('open');
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('img-modal')) return;
  document.getElementById('img-modal').classList.remove('open');
  document.getElementById('modal-img').src = '';
}

// ==============================
// 質問定義
// ==============================
const QUESTIONS = [
  {
    id: 'meigi',
    step: 'STEP 1 ／ 名義',
    text: 'ご契約者（名義）はどちらですか？',
    type: 'single',
    choices: [
      { label: '個人', value: 'kojin', icon: '👤' },
      { label: '法人', value: 'hojin', icon: '🏢' },
    ]
  },
  {
    id: 'shashubetsu',
    step: 'STEP 2 ／ 車種区分',
    text: 'ご購入される車はどちらですか？',
    type: 'single',
    choices: [
      { label: '普通車・小型車', value: 'futsuu', icon: '🚗' },
      { label: '軽自動車', value: 'kei', icon: '🚙' },
    ]
  },
  {
    id: 'shako',
    step: 'STEP 3 ／ 車庫証明',
    text: '車庫証明の取得が必要ですか？',
    note: '※ 軽自動車（地域による）・地域によっては不要な場合があります',
    type: 'yesno',
    choices: [
      { label: 'はい（必要）', value: 'yes', icon: '✓', cls: 'yes-btn' },
      { label: 'いいえ（不要）', value: 'no', icon: '✗', cls: 'no-btn' },
    ]
  },
  // ===== 法人専用：登記住所との一致確認 =====
  {
    id: 'shako_hojin_jusho',
    step: 'STEP 3-a ／ 使用の本拠',
    text: '車庫の住所は、法人の登記住所と同じですか？',
    note: '※ 異なる場合は「使用の本拠」を証明する書類が追加で必要になります',
    type: 'yesno',
    condition: (a) => a.shako === 'yes' && a.meigi === 'hojin',
    choices: [
      { label: 'はい（同じ）', value: 'yes', icon: '✓', cls: 'yes-btn' },
      { label: 'いいえ（異なる）', value: 'no', icon: '✗', cls: 'no-btn' },
    ]
  },
  // ===== 個人：車庫の種類 =====
  {
    id: 'shako_type',
    step: 'STEP 3-b ／ 車庫の種類',
    text: '車庫（保管場所）はどちらですか？',
    type: 'single',
    condition: (a) => a.shako === 'yes' && a.meigi === 'kojin',
    choices: [

// ==============================
// 状態管理
// ==============================
let answers = {};
let currentStep = 0;
let visibleQuestions = [];

function getVisibleQuestions() {
  return QUESTIONS.filter(q => !q.condition || q.condition(answers));
}

function updateProgress() {
  const total = getVisibleQuestions().length;
  const done = Math.min(currentStep, total);
  const pct = total > 0 ? (done / total * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-count').textContent = done + ' / ' + total;
}

// ==============================
// レンダリング
// ==============================
function render() {
  visibleQuestions = getVisibleQuestions();
  const container = document.getElementById('questions-section');
  container.innerHTML = '';

  for (let i = 0; i <= currentStep && i < visibleQuestions.length; i++) {
    const q = visibleQuestions[i];
    const answered = answers[q.id] !== undefined;
    const isActive = i === currentStep;

    const card = document.createElement('div');
    card.className = 'question-card';
    card.id = 'qcard-' + q.id;

    let choicesHTML = visibleQuestions[i].choices.map(c => {
      const sel = answers[q.id] === c.value ? 'selected' : '';
      const cls = c.cls || '';
      return `<button class="choice-btn ${cls} ${sel}" onclick="answer('${q.id}', '${c.value}', this, ${i})">
        <span class="icon">${answers[q.id] === c.value ? '✓' : ''}</span>
        <span>${c.icon ? c.icon + '　' : ''}${c.label}</span>
      </button>`;
    }).join('');

    const isTwoCol = q.choices.length === 2 && q.type === 'yesno';

    card.innerHTML = `
      <div class="q-step">${q.step}</div>
      <div class="q-text">${q.text}</div>
      ${q.note ? `<div class="q-note">${q.note}</div>` : ''}
      <div class="choices ${isTwoCol ? 'two-col' : ''}">${choicesHTML}</div>
    `;

    if (!isActive) {
      // 過去のカードは暗くしない — そのまま
    }

    container.appendChild(card);
  }

  updateProgress();

  // 全問完了チェック
  if (currentStep >= visibleQuestions.length) {
    showResult();
  }
}

function answer(qid, value, btn, stepIndex) {
  // 過去の質問を再クリックした場合、それ以降の回答をクリアしてそのステップから再開
  if (stepIndex < currentStep) {
    const allQ = getVisibleQuestions();
    for (let i = stepIndex + 1; i < allQ.length; i++) {
      delete answers[allQ[i].id];
    }
    currentStep = stepIndex;
  }

  answers[qid] = value;
  // 同じカード内のボタンを更新
  const card = document.getElementById('qcard-' + qid);
  card.querySelectorAll('.choice-btn').forEach(b => {
    b.classList.remove('selected');
    b.querySelector('.icon').textContent = '';
  });
  btn.classList.add('selected');
  btn.querySelector('.icon').textContent = '✓';

  // 少し待ってから自動で次へ進む
  setTimeout(() => nextStep(), 300);
}

function nextStep() {
  currentStep++;
  visibleQuestions = getVisibleQuestions();
  if (currentStep >= visibleQuestions.length) {
    showResult();
  } else {
    render();
    // 新しいカードへスクロール
    setTimeout(() => {
      const q = visibleQuestions[currentStep];
      const el = document.getElementById('qcard-' + q.id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
  }
}

function restart() {
  answers = {};
  currentStep = 0;
  document.getElementById('result-section').style.display = 'none';
  document.getElementById('questions-section').style.display = 'block';
  document.querySelector('.progress-bar-wrap').style.display = 'flex';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

  // ========== お支払い ==========
  let payDocs = [];
  if (answers.shiharai === 'credit') {
    // クレジット（残クレ/バリ保/楽まる）
    if (answers.koza_toroku === 'yes') {
      payDocs.push({ name: '引き落とし口座のキャッシュカード', note: '口座登録用', req: 'required' });
    }
    if (answers.meigi === 'hojin') {
      notes.push('法人クレジットの場合は、審査に代表者の個人情報（運転免許証等）が必要となる場合があります。');
    }
  } else if (answers.shiharai === 'jisha') {
    // 自社クレジット
    payDocs.push({ name: '引き落とし口座のキャッシュカード', note: '口座登録用', req: 'required' });
    if (answers.meigi === 'hojin') {
      notes.push('法人クレジットの場合は、審査に代表者の個人情報（運転免許証等）が必要となる場合があります。');
    }
  } else {
    // 現金一括
    payDocs.push({ name: '申込金（手付金）', note: '金額は商談時に確認', req: 'case' });
    payDocs.push({ name: '残金（納車時）', note: '現金 or 銀行振込', req: 'required' });
  }
  html += buildSection('お支払い', 'sec-pay', payDocs, 'pay');

  // ========== 自動車保険 ==========
  let insDocs = [];
  if (answers.hoken === 'tasha') {
    insDocs.push({ name: '現在の保険証券', note: '他社保険の確認用', req: 'required' });
    html += buildSection('自動車保険', 'sec-ins', insDocs, 'ins');
  } else if (answers.hoken === 'jisha' || answers.hoken === 'mikanyuu') {
    // 自社・未加入は追加書類なし
  }

  document.getElementById('result-content').innerHTML = html;

  // 注記
  let noteHTML = '⚠️ <strong>注意事項：</strong>書類は原則「原本」をお持ちいただいてください。';
  if (notes.length > 0) {
    noteHTML += '<br>' + notes.map(n => '・' + n).join('<br>');
  }
  document.getElementById('result-note').innerHTML = noteHTML;

  rs.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function buildSection(title, cls, docs, type) {
  const items = docs.map(d => {
    const badgeCls = d.req === 'required' ? 'badge-required' : d.req === 'car' ? 'badge-car' : 'badge-case';
    const badgeLabel = d.req === 'required' ? '必須' : d.req === 'car' ? '🚗 車と一緒' : '場合による';
    const hasImg = !!DOC_IMAGES[d.name];
    const nameHTML = hasImg
      ? `<div class="doc-name has-image" onclick="openModal('${d.name}')">${d.name}</div>`
      : `<div class="doc-name">${d.name}</div>`;
    return `<li class="doc-item ${type}">
      <span class="doc-icon">📄</span>
      <div>
        ${nameHTML}
        ${d.note ? `<div class="doc-note">${d.note}</div>` : ''}
      </div>
      <span class="required-badge ${badgeCls}">${badgeLabel}</span>
    </li>`;
  }).join('');

  return `<div class="section-block">
    <div class="section-title ${cls}">${title}</div>
    <ul class="doc-list">${items}</ul>
  </div>`;
}

// ==============================
// 初期化
// ==============================
render();
</script>
</body>
</html>
